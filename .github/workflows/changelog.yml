name: "Generate changelog"
on:
  release:
    types: [created, edited]

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: BobAnkh/auto-generate-changelog@v1.3.1
        with:
          REPO_NAME: "michelonsouza/encrypt-storage"
          COMMITTER: "Michelon Souza <michelon.souza@hotmail.com>"
          ACCESS_TOKEN: ${{secrets.CHANGELOG_TOKEN}}
          PATH: "CHANGELOG.md"
          COMMIT_MESSAGE: "docs(CHANGELOG): update release notes"
          TYPE: "feat:Feature,fix:Bug Fixes,chore:Chore,docs:Documentation,refactor:Refactor,perf:Performance Improvements"
